<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Online</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --bg-input: #1a1a2e;
            --accent: #6c63ff;
            --accent-hover: #5a52d5;
            --accent-glow: rgba(108, 99, 255, 0.3);
            --text-primary: #e8e8f0;
            --text-secondary: #8888a8;
            --text-muted: #555570;
            --bubble-me: linear-gradient(135deg, #6c63ff 0%, #4834d4 100%);
            --bubble-other: #1e2746;
            --system-bg: rgba(108, 99, 255, 0.1);
            --border: rgba(108, 99, 255, 0.15);
            --online-dot: #2ecc71;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        html, body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* ─── Login Screen ─── */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            padding: 20px;
        }

        .login-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 36px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow);
            text-align: center;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-icon {
            width: 80px;
            height: 80px;
            background: var(--bubble-me);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .login-box h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #6c63ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-box p {
            color: var(--text-secondary);
            margin-bottom: 28px;
            font-size: 14px;
        }

        .login-input {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            margin-bottom: 18px;
        }

        .login-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--bubble-me);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
        .login-btn:active { transform: scale(0.98); }

        /* ─── Chat Screen ─── */
        .chat-screen {
            display: none;
            flex-direction: column;
            height: 100dvh;
        }

        .chat-screen.active { display: flex; }
        .login-screen.hidden { display: none; }

        /* Header */
        .chat-header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .chat-header-left { display: flex; align-items: center; gap: 12px; }

        .header-avatar {
            width: 40px;
            height: 40px;
            background: var(--bubble-me);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .header-info h2 {
            font-size: 16px;
            font-weight: 600;
        }

        .header-info .online-status {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: var(--online-dot);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }

        /* Message bubbles */
        .msg { display: flex; flex-direction: column; max-width: 80%; animation: msgIn 0.3s ease-out; }
        .msg.me { align-self: flex-end; align-items: flex-end; }
        .msg.other { align-self: flex-start; align-items: flex-start; }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-sender {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 3px;
            padding-left: 4px;
        }

        .msg.me .msg-sender { color: var(--text-secondary); }

        .msg-bubble {
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.45;
            word-wrap: break-word;
            max-width: 100%;
        }

        .msg.me .msg-bubble {
            background: var(--bubble-me);
            color: #fff;
            border-bottom-right-radius: 6px;
        }

        .msg.other .msg-bubble {
            background: var(--bubble-other);
            color: var(--text-primary);
            border-bottom-left-radius: 6px;
        }

        .msg-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 3px;
            padding: 0 4px;
        }

        /* System message */
        .msg-system {
            align-self: center;
            background: var(--system-bg);
            color: var(--text-secondary);
            font-size: 13px;
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            animation: msgIn 0.3s ease-out;
        }

        /* Input bar */
        .chat-input-bar {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            padding: 12px 18px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .chat-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .chat-input::placeholder { color: var(--text-muted); }

        .send-btn {
            width: 46px;
            height: 46px;
            background: var(--bubble-me);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 16px var(--accent-glow); }
        .send-btn:active { transform: scale(0.94); }

        /* Responsive */
        @media (max-width: 480px) {
            .login-box { padding: 36px 24px; border-radius: 20px; }
            .login-box h1 { font-size: 24px; }
            .msg { max-width: 88%; }
        }
    </style>
</head>
<body>

<!-- ─── Màn hình đăng nhập ─── -->
<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <div class="login-icon">💬</div>
        <h1>Chat Online</h1>
        <p>Nhập tên của bạn để bắt đầu trò chuyện</p>
        <input type="text" class="login-input" id="nicknameInput"
               placeholder="Tên của bạn..." maxlength="30" autocomplete="off">
        <button class="login-btn" id="joinBtn">Tham gia ngay</button>
    </div>
</div>

<!-- ─── Màn hình chat ─── -->
<div class="chat-screen" id="chatScreen">
    <div class="chat-header">
        <div class="chat-header-left">
            <div class="header-avatar">💬</div>
            <div class="header-info">
                <h2>Phòng Chat Chung</h2>
                <div class="online-status">
                    <span class="online-dot"></span>
                    <span id="onlineCount">0</span> người đang online
                </div>
            </div>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="chat-input-bar">
        <input type="text" class="chat-input" id="msgInput"
               placeholder="Nhập tin nhắn..." autocomplete="off">
        <button class="send-btn" id="sendBtn">➤</button>
    </div>
</div>

<script>
    const socket = io();
    let myNickname = "";

    // ─── Elements ───
    const loginScreen  = document.getElementById("loginScreen");
    const chatScreen   = document.getElementById("chatScreen");
    const nicknameInput = document.getElementById("nicknameInput");
    const joinBtn      = document.getElementById("joinBtn");
    const chatMessages = document.getElementById("chatMessages");
    const msgInput     = document.getElementById("msgInput");
    const sendBtn      = document.getElementById("sendBtn");
    const onlineCount  = document.getElementById("onlineCount");

    // ─── Tham gia ───
    function thamGia() {
        const name = nicknameInput.value.trim();
        if (!name) { nicknameInput.focus(); return; }
        myNickname = name;
        socket.emit("tham_gia", { nickname: myNickname });
        loginScreen.classList.add("hidden");
        chatScreen.classList.add("active");
        document.title = "Chat Online - " + myNickname;
        msgInput.focus();
    }

    joinBtn.addEventListener("click", thamGia);
    nicknameInput.addEventListener("keydown", (e) => { if (e.key === "Enter") thamGia(); });

    // ─── Gửi tin nhắn ───
    function guiTin() {
        const text = msgInput.value.trim();
        if (!text) return;
        socket.emit("gui_tin", { text });
        msgInput.value = "";
        msgInput.focus();
    }

    sendBtn.addEventListener("click", guiTin);
    msgInput.addEventListener("keydown", (e) => { if (e.key === "Enter") guiTin(); });

    // ─── Hiển thị tin nhắn ───
    function formatTime(ts) {
        const d = new Date(ts * 1000);
        return d.getHours().toString().padStart(2, "0") + ":" +
               d.getMinutes().toString().padStart(2, "0");
    }

    function themTinNhan(data) {
        if (data.type === "system") {
            const el = document.createElement("div");
            el.className = "msg-system";
            el.textContent = data.text;
            chatMessages.appendChild(el);
        } else {
            const isMe = data.nickname === myNickname;
            const wrapper = document.createElement("div");
            wrapper.className = "msg " + (isMe ? "me" : "other");

            if (!isMe) {
                const sender = document.createElement("div");
                sender.className = "msg-sender";
                sender.textContent = data.nickname;
                wrapper.appendChild(sender);
            }

            const bubble = document.createElement("div");
            bubble.className = "msg-bubble";
            bubble.textContent = data.text;
            wrapper.appendChild(bubble);

            const timeEl = document.createElement("div");
            timeEl.className = "msg-time";
            timeEl.textContent = formatTime(data.ts);
            wrapper.appendChild(timeEl);

            chatMessages.appendChild(wrapper);
        }
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // ─── Socket Events ───
    socket.on("lich_su", (history) => {
        chatMessages.innerHTML = "";
        history.forEach(themTinNhan);
    });

    socket.on("tin_nhan", themTinNhan);

    socket.on("cap_nhat_online", (count) => {
        onlineCount.textContent = count;
    });

    // Focus input khi trang load
    nicknameInput.focus();
</script>
</body>
</html>
